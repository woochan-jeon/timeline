<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WON:DER 타임라인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#F4F5F7; --surface:#FFFFFF; --ink:#1B1E26; --muted:#6A7180; --faint:#9AA1AD;
    --line:#E6E8EC; --line2:#EEEFF2; --danger:#C7402F;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{padding:0 0 64px}
  button{font-family:inherit;cursor:pointer}
  .wrap{max-width:1040px;margin:0 auto;padding:0 20px}

  header.app{display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    padding:18px 0 16px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px}
  .mark{display:grid;grid-template-columns:1fr 1fr;gap:2px}
  .mark i{width:8px;height:8px;border-radius:2px;display:block}
  .mark i:nth-child(1){background:#0E7C66}
  .mark i:nth-child(2){background:#5A4FCF}
  .mark i:nth-child(3){background:#CB5A34}
  .mark i:nth-child(4){background:#C7C9CF}
  .brand h1{font-size:17px;font-weight:600;margin:0;letter-spacing:-.01em}
  .dday{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:4px}
  .dditem{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
  .dditem .ddlabel{font-size:12px}
  .dditem b{font-family:var(--mono);font-size:15px;color:var(--ink);font-weight:600;letter-spacing:.02em}
  .ddsep{color:var(--line);font-size:14px}
  .spacer{flex:1}
  .actions{display:flex;align-items:center;gap:8px;position:relative}
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);
    font-size:13px;font-weight:500;padding:8px 13px;border-radius:9px;transition:.12s}
  .btn:hover{border-color:#D2D5DB;background:#FBFBFC}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#000}
  .btn.icon{padding:8px 11px}

  .menu{position:absolute;top:42px;right:0;z-index:40;background:var(--surface);
    border:1px solid var(--line);border-radius:11px;padding:5px;min-width:182px;
    box-shadow:0 8px 24px rgba(20,22,28,.10)}
  .menu button{display:block;width:100%;text-align:left;border:0;background:none;
    font-size:13px;color:var(--ink);padding:8px 10px;border-radius:7px}
  .menu button:hover{background:var(--bg)}
  .menu .sep{height:1px;background:var(--line);margin:4px 6px}
  .menu .danger{color:var(--danger)}
  .backdrop{position:fixed;inset:0;z-index:30}

  .controls{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:16px 0 6px}
  .tabs{display:inline-flex;border:1px solid var(--line);border-radius:10px;
    background:var(--surface);padding:3px}
  .tabs button{border:0;background:none;font-size:13px;font-weight:500;color:var(--muted);
    padding:7px 16px;border-radius:8px}
  .tabs button.on{background:var(--ink);color:#fff}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
    background:var(--surface);font-size:12.5px;font-weight:500;color:var(--muted);
    padding:6px 12px;border-radius:20px;transition:.12s}
  .chip .pdot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.85}
  .chip.on{color:#fff}
  .chip.on.p-exhibition{background:#0E7C66;border-color:#0E7C66}
  .chip.on.p-ecommerce{background:#5A4FCF;border-color:#5A4FCF}
  .chip.on.p-etc{background:#CB5A34;border-color:#CB5A34}
  .chip.all{color:var(--ink)}
  .chip.all.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.all .pdot{display:none}

  .p-exhibition{--accent:#0E7C66;--tint:#DCEFE9;--bink:#0B5446}
  .p-ecommerce{--accent:#5A4FCF;--tint:#E6E3F7;--bink:#3A2F94}
  .p-etc{--accent:#CB5A34;--tint:#F6E3D9;--bink:#8F3E20}

  /* ---------- Overview (Gantt) ---------- */
  .scroller{overflow-x:auto;margin-top:14px;padding-bottom:8px}
  .gantt{position:relative}
  .months{position:relative;height:26px;border-bottom:1px solid var(--line)}
  .months .m{position:absolute;top:4px;font-size:12px;color:var(--muted);font-weight:500;
    padding-left:7px}
  .body{position:relative;padding-top:6px}
  .glayer{position:absolute;top:0;bottom:0;z-index:0;pointer-events:none}
  .gl{position:absolute;top:0;bottom:0;width:1px;background:var(--line2)}
  .today{position:absolute;top:0;bottom:0;width:2px;background:var(--ink);z-index:2}
  .today span{position:absolute;top:-2px;left:-15px;font-size:10px;font-weight:600;
    color:#fff;background:var(--ink);padding:1px 5px;border-radius:5px}
  .grp{position:relative;z-index:1;margin-bottom:6px}
  .grp-h{display:flex;align-items:center;gap:8px;height:30px;font-size:13px;font-weight:600;
    color:var(--bink)}
  .grp-h .pdot{width:9px;height:9px;border-radius:3px;background:var(--accent)}
  .grp-n{font-family:var(--mono);font-size:11px;color:var(--faint);font-weight:500}
  .grow{display:flex;align-items:center}
  .glabel{width:120px;flex:none;font-size:12px;color:var(--muted);padding-right:12px;
    height:26px;line-height:26px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    background:var(--bg)}
  .gtrack{flex:none;position:relative;height:26px}
  .bar{position:absolute;top:4px;height:18px;background:var(--tint);border-radius:5px;
    display:flex;align-items:center;padding:0 7px;overflow:hidden;cursor:pointer;
    box-shadow:inset 3px 0 0 var(--accent)}
  .bar span{font-size:11px;color:var(--bink);font-weight:500;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;pointer-events:none}
  .bar .rs{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:2}
  .bar .rs-l{left:0}.bar .rs-r{right:0}
  .bar:hover .rs{background:rgba(20,22,28,.07)}
  .bar:hover{filter:brightness(.97)}
  .bar.done{opacity:.5}
  .bar.done span{text-decoration:line-through}
  .bar.delayed{box-shadow:inset 3px 0 0 var(--danger);outline:1.5px solid var(--danger)}
  .ms{position:absolute;top:0;height:26px;display:flex;align-items:center;cursor:pointer}
  .ms .dia{width:11px;height:11px;background:var(--accent);transform:rotate(45deg);
    border-radius:2px;flex:none}
  .ms .mslab{font-size:10.5px;color:var(--bink);font-weight:600;margin-left:6px;
    white-space:nowrap;pointer-events:none}
  .ms:hover .dia{filter:brightness(1.08)}

  /* ---------- Week grid ---------- */
  .weeknav{display:flex;align-items:center;gap:10px;margin:16px 0 12px}
  .weeknav .wl{font-size:14px;font-weight:600;min-width:152px}
  .wbtn{border:1px solid var(--line);background:var(--surface);font-size:12.5px;
    color:var(--ink);padding:6px 11px;border-radius:8px}
  .wbtn:hover{background:#FBFBFC}
  .wscroller{overflow-x:auto}
  .wgrid{display:grid;border:1px solid var(--line);border-radius:12px;overflow:hidden;
    background:var(--surface);min-width:760px}
  .wh,.wlabel,.wcell{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2)}
  .wh{padding:9px 10px;display:flex;align-items:baseline;gap:6px;background:#FBFBFC}
  .wh b{font-size:12.5px;font-weight:600}
  .wh span{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .wh.corner{background:var(--surface)}
  .wh.today{background:#F0F1F4}
  .wh.today b{color:var(--ink)}
  .wlabel{display:flex;align-items:center;gap:7px;padding:10px;font-size:12.5px;
    font-weight:600;color:var(--bink);background:#FBFBFC}
  .wlabel .pdot{width:9px;height:9px;border-radius:3px;background:var(--accent)}
  .wcell{padding:7px;display:flex;flex-direction:column;gap:5px;min-height:54px}
  .wcell.today{background:#FAFAFB}
  .wchip{display:flex;align-items:center;gap:6px;background:var(--tint);color:var(--bink);
    font-size:11.5px;font-weight:500;padding:5px 8px;border-radius:7px;cursor:pointer;
    box-shadow:inset 3px 0 0 var(--accent);line-height:1.25}
  .wchip .pdot{display:none}
  .wchip:hover{filter:brightness(.97)}
  .wchip.ongoing{background:transparent;border:1px dashed var(--accent);box-shadow:none;
    color:var(--muted)}
  .wchip.done{opacity:.5;text-decoration:line-through}
  .wchip.delayed{box-shadow:inset 3px 0 0 var(--danger)}
  .row-end{grid-column:1/-1;border-bottom:0}
  .wh.last,.wcell.last,.wlabel.last{border-right:0}

  .empty{padding:48px 20px;text-align:center;color:var(--faint);font-size:14px}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(22,24,30,.42);
    display:flex;align-items:flex-start;justify-content:center;padding:48px 16px;overflow:auto}
  .modal{background:var(--surface);border-radius:16px;width:100%;max-width:440px;
    padding:22px;box-shadow:0 16px 48px rgba(20,22,28,.22)}
  .modal h2{font-size:16px;font-weight:600;margin:0 0 16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px}
  .field input,.field select{width:100%;border:1px solid var(--line);border-radius:9px;
    padding:9px 11px;font-size:13.5px;font-family:inherit;color:var(--ink);background:var(--surface)}
  .field input:focus,.field select:focus{outline:2px solid #C9D0DA;border-color:#C9D0DA}
  .two{display:flex;gap:11px}
  .two .field{flex:1}
  .check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);cursor:pointer}
  .check input{width:auto}
  .mfoot{display:flex;align-items:center;gap:8px;margin-top:20px}
  .mfoot .spacer{flex:1}
  .del{border:1px solid var(--line);background:var(--surface);color:var(--danger);
    font-size:13px;padding:9px 13px;border-radius:9px;font-weight:500}
  .del:hover{background:#FCF4F3;border-color:#F0CFC9}

  @media (max-width:560px){
    .brand h1{font-size:15px}.dday{width:100%;margin-left:0}
    .actions{order:3}.controls{gap:12px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  .bar,.ms{cursor:grab}
  .bar.dragging,.ms.dragging{cursor:grabbing;z-index:5;opacity:.92}
  .dragtip{position:fixed;z-index:60;background:var(--ink);color:#fff;font-size:11px;
    font-family:var(--mono);padding:3px 7px;border-radius:6px;pointer-events:none;
    transform:translate(-50%,-160%);white-space:nowrap}
  .cnav{display:flex;align-items:center;gap:8px;margin:16px 0 12px}
  .cnav .cml{font-size:15px;font-weight:600;min-width:104px;text-align:center}
  .wbtn[disabled]{opacity:.4;cursor:default}
  .cal{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface)}
  .cal.caldrag .cev{pointer-events:none}
  .chead{display:grid;grid-template-columns:repeat(7,1fr);background:#FBFBFC;border-bottom:1px solid var(--line)}
  .chead>div{padding:8px 10px;font-size:12px;font-weight:600;color:var(--muted);border-right:1px solid var(--line2)}
  .chead>div:last-child{border-right:0}
  .cwk{position:relative;border-bottom:1px solid var(--line2)}
  .cwk:last-child{border-bottom:0}
  .cbglayer{display:grid;grid-template-columns:repeat(7,1fr);position:absolute;inset:0;pointer-events:none;z-index:0}
  .cbg{border-right:1px solid var(--line2)}
  .cbg.last{border-right:0}
  .cbg.out{background:#FAFAFB}
  .cbg.today{background:#F0F1F4}
  .cbg.drop{background:#EAF6F1}
  .cdatelayer{display:grid;grid-template-columns:repeat(7,1fr);position:relative;z-index:1;pointer-events:none}
  .cdate{font-size:11.5px;color:var(--muted);padding:4px 7px;
    font-variant-numeric:tabular-nums}
  .cdate.out{color:#C4C8CF}
  .cdate.today{color:var(--ink);font-weight:700;
    background:var(--ink);color:#fff;border-radius:50%;
    width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    margin:2px 0 0 5px;padding:0;font-size:11px}
  .clevlayer{display:grid;grid-template-columns:repeat(7,1fr);position:relative;z-index:2;padding-bottom:4px}
  .cev{position:absolute;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;
    background:var(--tint);color:var(--bink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    cursor:grab;box-shadow:inset 3px 0 0 var(--accent);box-sizing:border-box;pointer-events:auto}
  .cev:hover{filter:brightness(.97)}
  .cev.dragging{opacity:.6;cursor:grabbing}
  .cev.open-l{border-top-left-radius:0;border-bottom-left-radius:0;box-shadow:none}
  .cev.open-r{border-top-right-radius:0;border-bottom-right-radius:0}
  .cev.done{opacity:.5;text-decoration:line-through}
  .cev.delayed{box-shadow:inset 3px 0 0 var(--danger)}
  .cev.ms{background:transparent;box-shadow:none;font-weight:600}
  .cev .cdia{display:inline-block;width:8px;height:8px;background:var(--accent);transform:rotate(45deg);
    border-radius:2px;margin-right:5px;vertical-align:-1px}
  .cev .rs{position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;z-index:3}
  .cev .rs-l{left:0}.cev .rs-r{right:0}
  .cev:hover .rs{background:rgba(20,22,28,.10)}
</style>
</head>
<body>
<div class="wrap">
  <div id="root"></div>
</div>
<div id="modal"></div>
<input type="file" id="restoreInput" accept="application/json" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://gswauvwkpdsvmekihveb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdzd2F1dndrcGRzdm1la2lodmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNjkxMjIsImV4cCI6MjA5NzY0NTEyMn0.qWSUV_xOrhtWZJ0r-oXpHqLQx6M4ch8CryS9UE93VHc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const PROJECTS = {
  exhibition:{label:'팀전시회'},
  ecommerce:{label:'전자상거래'},
  etc:{label:'기타'}
};
const ORDER = ['exhibition','ecommerce','etc'];
const STATUS = {planned:'예정',doing:'진행',done:'완료',delayed:'지연'};
const RANGE_START='2026-06-01', RANGE_END='2026-12-31';
const DDAY_KEY='wonder-ddays-v1';
const LABEL_W=120, PX=3.4;
const DAYNAMES=['월','화','수','목','금','토','일'];
const KEY='wonder-timeline-v1';

const SEED=[];

function dt(s){return new Date(s+'T12:00:00');}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function di(s){return Math.round((dt(s)-dt(RANGE_START))/864e5);}
function diff(a,b){return Math.round((dt(b)-dt(a))/864e5);}
function addD(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function mondayOf(d){const x=new Date(d);const wd=(x.getDay()+6)%7;return addD(x,-wd);}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function expandSeed(){return SEED.map(t=>({id:uid(),project:t[0],category:t[1],title:t[2],start:t[3],end:t[4],milestone:!!t[5],status:t[6]||'planned'}));}
function monthList(){const a=[];for(let m=6;m<=12;m++)a.push('2026-'+String(m).padStart(2,'0'));return a;}

const TODAY=iso(new Date());
const CHART_W=Math.round((diff(RANGE_START,RANGE_END)+1)*PX);

let tasks=[];
let ui={tab:'overview',filter:{exhibition:true,ecommerce:true,etc:true},
        week:iso(mondayOf(new Date())),
        month:(monthList().includes(iso(new Date()).slice(0,7))?iso(new Date()).slice(0,7):'2026-06'),
        menu:false,editing:null};

/* ---------- Supabase CRUD ---------- */
async function loadTasks(){
  const {data,error}=await sb.from('timeline_tasks').select('*').order('start_date');
  if(error){console.error(error);return [];}
  return data.map(r=>({id:r.id,project:r.project,category:r.category,title:r.title,
    start:r.start_date,end:r.end_date,milestone:r.milestone,status:r.status}));
}
async function upsertTask(t){
  await sb.from('timeline_tasks').upsert({id:t.id,project:t.project,category:t.category,
    title:t.title,start_date:t.start,end_date:t.end,milestone:t.milestone,status:t.status});
}
async function removeTask(id){
  await sb.from('timeline_tasks').delete().eq('id',id);
}
async function loadDdays(){
  const {data,error}=await sb.from('timeline_ddays').select('*').order('id');
  if(error||!data||!data.length) return [{label:'SGPF 2026',date:'2026-07-31'}];
  return data.map(r=>({label:r.label,date:r.date}));
}
async function saveDdays(arr){
  await sb.from('timeline_ddays').delete().neq('id',0);
  if(arr.length) await sb.from('timeline_ddays').insert(arr.map(d=>({label:d.label,date:d.date})));
}
let ddays=[{label:'SGPF 2026',date:'2026-07-31'}];

const root=document.getElementById('root');
const modalHost=document.getElementById('modal');

function render(){
  root.innerHTML = headerHTML() + controlsHTML() + (ui.tab==='overview'?overviewHTML():weekHTML());
}

function headerHTML(){
  const ddHtml=ddays.map(d=>{
    const dd=diff(TODAY,d.date);
    const tx=dd>0?'D-'+dd:dd===0?'D-DAY':'D+'+(-dd);
    return '<span class="dditem"><span class="ddlabel">'+esc(d.label)+'</span><b>'+tx+'</b></span>';
  }).join('<span class="ddsep">·</span>');
  const menu = ui.menu ? (
    '<div class="backdrop" data-act="menuclose"></div>'+
    '<div class="menu">'+
      '<button data-act="ddaysetting">D-day 설정</button>'+
      '<button data-act="backup">백업 내보내기 (JSON)</button>'+
      '<button data-act="restore">백업 가져오기</button>'+
      '<div class="sep"></div>'+
      '<button class="danger" data-act="reset">전체 일정 비우기</button>'+
    '</div>') : '';
  return ''+
  '<header class="app">'+
    '<div class="brand"><span class="mark"><i></i><i></i><i></i><i></i></span>'+
      '<h1>WON:DER 타임라인</h1></div>'+
    '<div class="dday">'+ddHtml+'</div>'+
    '<div class="spacer"></div>'+
    '<div class="actions">'+
      '<button class="btn primary" data-act="add">+ 일정 추가</button>'+
      '<button class="btn icon" data-act="menu" aria-label="메뉴">⋯</button>'+
      menu+
    '</div>'+
  '</header>';
}

function controlsHTML(){
  const tab=(id,l)=>'<button class="'+(ui.tab===id?'on':'')+'" data-act="tab" data-tab="'+id+'">'+l+'</button>';
  const allOn=ORDER.every(p=>ui.filter[p]);
  let chips='<button class="chip all '+(allOn?'on':'')+'" data-act="filter" data-proj="all">전체</button>';
  ORDER.forEach(p=>{
    chips+='<button class="chip p-'+p+' '+(ui.filter[p]?'on':'')+'" data-act="filter" data-proj="'+p+'">'+
      '<span class="pdot"></span>'+PROJECTS[p].label+'</button>';
  });
  return '<div class="controls"><div class="tabs">'+tab('overview','monthly')+tab('week','이번주')+
    '</div><div class="chips">'+chips+'</div></div>';
}

function visibleProjects(){return ORDER.filter(p=>ui.filter[p]);}

/* ---------- Overview ---------- */
function overviewHTML(){
  const vis=visibleProjects();
  const ms=monthList(), ci=ms.indexOf(ui.month);
  const ym=dt(ui.month+'-01');
  const navLabel=ym.getFullYear()+'년 '+(ym.getMonth()+1)+'월';
  const nav='<div class="cnav">'+
    '<button class="wbtn" data-act="month" data-dir="-1"'+(ci<=0?' disabled':'')+'>◀</button>'+
    '<span class="cml">'+navLabel+'</span>'+
    '<button class="wbtn" data-act="month" data-dir="1"'+(ci>=ms.length-1?' disabled':'')+'>▶</button>'+
    '<button class="wbtn" data-act="monthtoday">오늘</button></div>';

  if(!vis.length) return nav+'<div class="empty">표시할 프로젝트가 없다. 위 필터에서 하나 이상 켜자.</div>';

  const gridStart=mondayOf(dt(ui.month+'-01'));
  const last=new Date(ym.getFullYear(),ym.getMonth()+1,0);
  const weeks=Math.round((mondayOf(last)-gridStart)/(7*864e5))+1;

  let head='<div class="chead">'+DAYNAMES.map(n=>'<div>'+n+'</div>').join('')+'</div>';
  let body='';
  for(let wi=0;wi<weeks;wi++){
    const ws=addD(gridStart,wi*7);
    const wsISO=iso(ws), weISO=iso(addD(ws,6));
    const evs=tasks.filter(t=>vis.includes(t.project)&&t.start<=weISO&&t.end>=wsISO);
    evs.sort((a,b)=> a.start<b.start?-1 : a.start>b.start?1 : (diff(a.start,a.end)>=diff(b.start,b.end)?-1:1));
    const laneEnd=[];
    const placed=evs.map(t=>{
      const cs=Math.max(0,diff(wsISO,t.start));
      const ce=Math.min(6,diff(wsISO,t.end));
      let lane=laneEnd.findIndex(v=>v<cs);
      if(lane===-1){lane=laneEnd.length;laneEnd.push(ce);}else laneEnd[lane]=ce;
      return {t,cs,ce,lane};
    });
    const laneCount=Math.max(laneEnd.length,1);
    const ROW_H=22, EV_H=20, PAD=4;
    const totalH=ROW_H+laneCount*EV_H+PAD;
    let bgcells='', datecells='', bars='';
    for(let i=0;i<7;i++){
      const d=addD(ws,i), diso=iso(d);
      const out=d.getMonth()!==ym.getMonth(), today=diso===TODAY;
      bgcells+='<div class="cbg'+(out?' out':'')+(today?' today':'')+(i===6?' last':'')+'" data-date="'+diso+'"></div>';
      datecells+='<div class="cdate'+(out?' out':'')+(today?' today':'')+'">'+d.getDate()+'</div>';
    }
    placed.forEach(pl=>{
      const t=pl.t;
      const openL=t.start<wsISO, openR=t.end>weISO;
      const cls='p-'+t.project+(t.status==='done'?' done':'')+(t.status==='delayed'?' delayed':'')+
        (t.milestone?' ms':'')+(openL?' open-l':'')+(openR?' open-r':'');
      const handles=t.milestone?'':((!openL?'<span class="rs rs-l"></span>':'')+(!openR?'<span class="rs rs-r"></span>':''));
      const inner=(t.milestone?'<span class="cdia"></span>':'')+esc(t.title);
      const top=ROW_H+pl.lane*EV_H;
      const lPct=(pl.cs/7*100).toFixed(4);
      const wPct=((pl.ce-pl.cs+1)/7*100).toFixed(4);
      bars+='<div class="cev '+cls+'" data-act="edit" data-id="'+t.id+'" title="'+esc(t.title)+' · '+t.start+'~'+t.end+'" '+
        'style="top:'+top+'px;left:calc('+lPct+'% + 3px);width:calc('+wPct+'% - 6px);height:18px">'+inner+handles+'</div>';
    });
    body+='<div class="cwk" style="height:'+totalH+'px">'+
      '<div class="cbglayer" style="height:'+totalH+'px">'+bgcells+'</div>'+
      '<div class="cdatelayer">'+datecells+'</div>'+
      '<div class="cevlayer" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none">'+
        '<div style="position:relative;width:100%;height:100%;pointer-events:none">'+bars+'</div>'+
      '</div>'+
    '</div>';
  }
  const hint=tasks.length?'':'<div class="empty">아직 일정이 없다. 오른쪽 위 ‘+ 일정 추가’로 시작하자.</div>';
  return nav+hint+'<div class="cal">'+head+body+'</div>';
}

      'title="'+esc(t.title)+' · '+t.start+'"><span class="dia"></span>'+

function closeModal(){modalHost.innerHTML='';}

async function saveModal(id){
  const g=i=>document.getElementById(i);
  const title=g('f-title').value.trim();
  if(!title){g('f-title').focus();g('f-title').placeholder='제목을 입력하자';return;}
  let start=g('f-start').value||TODAY, end=g('f-end').value||start;
  if(end<start) end=start;
  const data={project:g('f-project').value,category:g('f-category').value.trim()||'일반',
    title,start,end,status:g('f-status').value,milestone:g('f-ms').checked};
  const task=Object.assign({id:id||uid()},data);
  if(id){const idx=tasks.findIndex(x=>x.id===id);if(idx>-1)tasks[idx]=task;else tasks.push(task);}
  else tasks.push(task);
  await upsertTask(task);
  closeModal();render();
}
async function deleteTask(id){
  if(!confirm('이 일정을 삭제할까?')) return;
  tasks=tasks.filter(t=>t.id!==id);
  await removeTask(id);
  closeModal();render();
}

/* ---------- Backup / restore / reset ---------- */
function backup(){
  try{
    const blob=new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='wonder-timeline-'+TODAY+'.json';
    a.click();URL.revokeObjectURL(a.href);
  }catch(e){alert('이 환경에서는 내보내기가 막혀 있다. 파일을 직접 열어 실행하면 동작한다.');}
}
document.getElementById('restoreInput').addEventListener('change',async function(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const a=JSON.parse(r.result);
      if(Array.isArray(a)){
        tasks=a;
        await sb.from('timeline_tasks').delete().neq('id','__none__');
        for(const t of tasks) await upsertTask(t);
        render();
      }else alert('형식이 맞지 않는 파일이다.');
    }catch(err){alert('읽을 수 없는 파일이다.');}
  };
  r.readAsText(f);e.target.value='';
});

/* ---------- Events ---------- */
document.addEventListener('click',async function(e){
  if(e.target.classList && e.target.classList.contains('overlay')){closeModal();return;}
  const el=e.target.closest('[data-act]');
  if(!el){ if(ui.menu){ui.menu=false;render();} return; }
  const act=el.dataset.act;

  switch(act){
    case 'tab': ui.tab=el.dataset.tab; render(); break;
    case 'filter':
      if(el.dataset.proj==='all') ORDER.forEach(p=>ui.filter[p]=true);
      else ui.filter[el.dataset.proj]=!ui.filter[el.dataset.proj];
      render(); break;
    case 'week':{
      const dir=+el.dataset.dir;
      ui.week = dir===0 ? iso(mondayOf(new Date())) : iso(addD(dt(ui.week),dir*7));
      render(); break;
    }
    case 'month':{
      const mss=monthList(), ci=mss.indexOf(ui.month);
      ui.month=mss[Math.max(0,Math.min(ci+(+el.dataset.dir),mss.length-1))];
      render(); break;
    }
    case 'monthtoday':{
      const nm=iso(new Date()).slice(0,7);
      ui.month=monthList().includes(nm)?nm:'2026-06'; render(); break;
    }
    case 'ddaysetting': ui.menu=false; render(); openDdaySetting(); break;
    case 'ddsave': await saveDdayModal(); break;
    case 'ddrow-add': addDdayRow(); break;
    case 'ddrow-del': delDdayRow(+el.dataset.idx); break;
    case 'add': ui.menu=false; render(); openModal(null); break;
    case 'edit': if(justDragged){justDragged=false;break;} openModal(el.dataset.id); break;
    case 'menu': ui.menu=!ui.menu; render(); break;
    case 'menuclose': ui.menu=false; render(); break;
    case 'backup': ui.menu=false; render(); backup(); break;
    case 'restore': ui.menu=false; render(); document.getElementById('restoreInput').click(); break;
    case 'reset': ui.menu=false; render(); if(confirm('모든 일정이 삭제된다. 계속할까?')){
      await sb.from('timeline_tasks').delete().neq('id','__none__');
      tasks=[];render();} break;
    case 'msave': await saveModal(el.dataset.id||null); break;
    case 'mdelete': await deleteTask(el.dataset.id); break;
    case 'mclose': closeModal(); break;
  }
});

/* ---------- Drag bars to reschedule ---------- */
let drag=null, justDragged=false, tip=null;
function idxToISO(i){return iso(addD(dt(RANGE_START),i));}
function clampStart(i){return Math.max(0,Math.min(i,di(RANGE_END)));}
function mdfmt(s){const d=dt(s);return (d.getMonth()+1)+'/'+d.getDate();}
function tipText(s,e){return s===e?mdfmt(idxToISO(s)):mdfmt(idxToISO(s))+' ~ '+mdfmt(idxToISO(e));}
function pointer(e){return e.touches&&e.touches[0]?e.touches[0]:e;}

function cellDateAt(x,y){const el=document.elementFromPoint(x,y);const c=el&&el.closest&&el.closest('.cbg');return c?c.dataset.date:undefined;}
function dragDown(e){
  if(ui.tab!=='overview')return;
  const node=e.target.closest('.cev');
  if(!node)return;
  const t=tasks.find(x=>x.id===node.dataset.id);
  if(!t)return;
  let mode='move';
  if(e.target.classList.contains('rs-l'))mode='start';
  else if(e.target.classList.contains('rs-r'))mode='end';
  const cal=node.closest('.cal'); if(cal)cal.classList.add('caldrag');
  const p=pointer(e);
  drag={id:t.id,node,cal,mode,sx:p.clientX,sy:p.clientY,moved:false,
        dur:diff(t.start,t.end),downDate:cellDateAt(p.clientX,p.clientY)||t.start,
        overDate:null,lastCell:null};
  node.classList.add('dragging');
  document.body.style.userSelect='none';
  if(e.cancelable)e.preventDefault();
}
function dragMove(e){
  if(!drag)return;
  const p=pointer(e);
  if(Math.abs(p.clientX-drag.sx)>3||Math.abs(p.clientY-drag.sy)>3)drag.moved=true;
  const el=document.elementFromPoint(p.clientX,p.clientY);
  const cell=el&&el.closest&&el.closest('.cbg');
  if(drag.lastCell&&drag.lastCell!==cell)drag.lastCell.classList.remove('drop');
  if(cell){cell.classList.add('drop');drag.lastCell=cell;drag.overDate=cell.dataset.date;}
  if(e.type==='touchmove'&&e.cancelable)e.preventDefault();
}
async function dragUp(){
  if(!drag)return;
  const d=drag;drag=null;
  d.node.classList.remove('dragging');
  if(d.lastCell)d.lastCell.classList.remove('drop');
  if(d.cal)d.cal.classList.remove('caldrag');
  document.body.style.userSelect='';
  if(!d.moved){
    justDragged=true;setTimeout(()=>{justDragged=false;},160);
    openModal(d.id);
    return;
  }
  const t=tasks.find(x=>x.id===d.id);
  if(t&&d.overDate){
    const maxI=di(RANGE_END);
    if(d.mode==='move'){
      const delta=diff(d.downDate,d.overDate);
      const s=Math.max(0,Math.min(di(t.start)+delta,maxI-d.dur));
      t.start=idxToISO(s);t.end=idxToISO(s+d.dur);
    }else if(d.mode==='start'){
      const s=Math.max(0,Math.min(di(d.overDate),di(t.end)));
      t.start=idxToISO(s);
    }else{
      const en=Math.max(di(t.start),Math.min(di(d.overDate),maxI));
      t.end=idxToISO(en);
    }
    await upsertTask(t);
  }
  justDragged=true;setTimeout(()=>{justDragged=false;},160);
  render();
}
